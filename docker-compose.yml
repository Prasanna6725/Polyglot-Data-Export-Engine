services:
  db:
    image: postgres:13-alpine
    container_name: data_export_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: exports_db
      # fixed default for seeding. can still be overridden via host `.env` if needed
      TOTAL_ROWS: "10000000"
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d exports_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - export_network

  app:
    build: .
    container_name: data_export_app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/exports_db
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=exports_db
      - PORT=8080
      - NODE_ENV=production
      - EXPORT_CHUNK_SIZE=1000
      - EXPORT_TIMEOUT=600000
      - MAX_MEMORY_MB=256
      # pass seed size so entrypoint knows when to start
      # TOTAL_ROWS is only needed by the database seeding; app doesn’t use it
    mem_limit: 256m
    memswap_limit: 256m
    volumes:
      - ./src:/app/src:ro
    networks:
      - export_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  export_network:
    driver: bridge
